<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>FixWise Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css codes/login.css">
</head>

<body>

  <!-- شاشة تسجيل كاملة -->
  <main class="auth-screen">

    <!--  اللوقو اسم الموقع -->
    <div class="auth-top-box">
      <img src="lofo.jpg" alt="FixWise Logo" class="auth-logo">

      <!--<h1>FixWise</h1> cancel-->

    </div>
    <section class="auth-card">
      <!-- التبديل إنشاء حساب وتسجيل الدخول -->
      <div class="auth-tabs">
        <a href="signup.html" class="tab">Create Account</a>
        <a href="login.html" class="tab active">Log In</a>
      </div>

      <!-- عنوان الكرت -->
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Fill out the information below in order to access your account.</p>
      </div>

      <!--  تسجيل الدخول -->
      <form class="auth-form" id="loginForm">

        <!-- خانة الإيميل -->
        <div class="input-box">
          <input type="email" id="loginEmail" placeholder="Email">
        </div>
          <div id="loginEmailMsg"></div>

        <!-- خانة الباسورد -->
        <div class="input-box password-box">
          <input type="password" id="loginPassword" placeholder="Password">

          <!-- أيقونة إظهار/إخفاء الباسورد -->
          <i class="fa-regular fa-eye-slash"></i>
        </div>
          <div id="loginPasswordMsg"></div>

        <!-- زر تسجيل الدخول -->
        <button type="button" class="primary-btn" onclick="validateLogin()">Sign In</button>

      </form>
      <!--  خيارات الدخول الأخرى -->
      <p class="social-text">Or sign in with</p>
      <div class="social-buttons">

        <a href="#" class="social-btn">
          <i class="fa-brands fa-google"></i>
          Continue with Google
        </a>

        <a href="#" class="social-btn">
          <i class="fa-brands fa-apple"></i>
          Continue with Apple
        </a>

      </div>

    </section>

  </main>
<script src="JS codes/losi.js"></script>
</body>
</html>
