<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixWise Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="css codes/2.css">
</head>

<body>

    <!-- Top Header -->
    <header class="services-header">

        <!-- Back icon -->
        <a href="index.html" class="back-icon">
            <i class="fa-solid fa-chevron-left"></i>
        </a>
      
        <h1>Services</h1>

        <!-- Right icons: cart + user -->
        <div class="header-icons">
            <a href="CartPage.html" class="icon-link">
                <i class="fa-solid fa-cart-shopping"></i>
            </a>

            <a href="signup.html" class="icon-link">
                <i class="fa-solid fa-user"></i>
            </a>
        </div>

    </header>

    <main class="services-page">

        <!-- Page intro -->
        <section class="services-intro">
            <h2>Categories</h2>
            <p>Choose a category to see our expert repair services.</p>
        </section>
      
        <!-- Cards -->
        <section class="categories-list">

            <!-- Phones Card -->
            <a href="PhoneRepair.html" class="category-card">
                <div class="category-icon">
                    <i class="fa-solid fa-mobile-screen-button"></i>
                </div>

                <div class="category-text">
                    <h3>Phones</h3>
                </div>

                <i class="fa-solid fa-chevron-right arrow"></i>

            </a>

            <!-- Laptops Card -->
            <a href="LaptopRepair.html" class="category-card">

                <div class="category-icon">
                    <i class="fa-solid fa-laptop"></i>
                </div>

                <div class="category-text">
                    <h3>Laptops</h3>
                </div>

                <i class="fa-solid fa-chevron-right arrow"></i>

            </a>

            <!-- Tv Card -->
            <a href="TVRepair.html" class="category-card">

                <div class="category-icon">
                    <i class="fa-solid fa-desktop"></i>
                </div>

                <div class="category-text">
                    <h3>TVs</h3>
                </div>

                <i class="fa-solid fa-chevron-right arrow"></i>

            </a>

        </section>

    </main>
</body>
</html>
