<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FixWise — Booking Confirmed</title>
  <link rel="stylesheet" href="css codes/style3.css" />
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html"><img src="FWlogo.jpg" alt="Assets/FixWise Logo" class="header-logo"></a>
  </div>
</header>


  <main class="page-wrapper">


    <div class="confirmation-icon">&#10003;</div>

    <h2 class="confirmation-title">Your booking is confirmed!</h2>
    <p class="confirmation-subtitle">
      Please bring your device on the date below.
    </p>


    <div class="confirmation-card">

      <div class="confirmation-row">
        <span class="conf-label">Order ID</span>
        <span class="conf-value">#RS-4100</span>
      </div>

      <div class="confirmation-row">
        <span class="conf-label">Drop-off Date</span>
        <span class="conf-value">Tuesday, May 26, 2026</span>
      </div>

      <div class="confirmation-row">
        <span class="conf-label">Estimated Ready</span>
        <span class="conf-value">2 Working Days</span>
      </div>

      <div class="confirmation-row">
        <span class="conf-label">Branch Location</span>
        <span class="conf-value">FixWise — Prince Turki Branch, Al Khobar</span>
      </div>

    </div>


    <a href="index.html" class="btn-book">Back to Home</a>

    <p class="contact-note">
      For any further info, please contact us at
      <a href="mailto:support@fixwise.com">support@fixwise.com</a>
    </p>

  </main>



</body>
</html>
